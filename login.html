<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="login-container">
        <div class="user-icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </div>

        <h2>Acesse sua conta!</h2>

        <form id="formLogin">
            <div class="form-group">
                <label for="nome">Nome de usuário</label>
                <input type="text" id="nome" placeholder="digite aqui..." required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="digite aqui..." required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <p id="mensagemErro">Nome de usuário ou senha incorretos!</p>

        <div class="links">
            <p>Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
        </div>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', function(event) {
            // Impede a página de recarregar ao clicar no botão
            event.preventDefault(); 

            // Pega os valores que o usuário digitou
            const nomeDigitado = document.getElementById('nome').value;
            const senhaDigitada = document.getElementById('senha').value;
            const mensagemErro = document.getElementById('mensagemErro');

            // Verifica se bate com os dados que você pediu
            if (nomeDigitado === 'admin' && senhaDigitada === '12345678!') {
                mensagemErro.style.display = 'none';
                alert('Login efetuado com sucesso! Bem-vindo, Admin.');
                // Aqui você redirecionaria para a página principal do seu site:
                // window.location.href = "pagina_principal.html";
            } else {
                // Se errar, mostra a mensagem de erro vermelha
                mensagemErro.style.display = 'block';
            }
        });
    </script>
</body>
</html>
